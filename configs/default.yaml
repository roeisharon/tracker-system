# Default configuration for the Real-Time Object Tracking & Re-acquisition System.
#
# Built-in dataclass defaults are the source of truth; this file mirrors them and
# is merged on top. Unknown keys are rejected so typos surface early.

video:
  processing_scale: 1.0        # 1.0 = track at native resolution
  url_open_timeout_ms: 10000

selection:
  default_bbox_size: 90
  # Burned-in overlay (HUD crosshair/telemetry) handling: inpaint it out of the
  # init patch and exclude it from appearance/flow matching. No-op on clean footage.
  handle_overlay: true
  overlay_sample_frames: 30
  overlay_static_std: 12.0
  overlay_min_motion_frac: 0.55

tracker:
  # hybrid = deep centre (ViT) + optical-flow scale — survives the drone's zoom.
  # Alternatives: vit | nano | csrt.
  backend: hybrid
  vit_model: models/vittrack.onnx
  nano_backbone: models/nanotrack_backbone.onnx
  nano_head: models/nanotrack_head.onnx
  min_box: 12.0
  # Flow-scale estimator (drives box size).
  flow_max_features: 200
  flow_min_features: 8
  flow_scale_min: 0.9
  flow_scale_max: 1.1
  flow_replenish_below: 40
  flow_score_norm: 60.0
  scale_cross_check: true       # damp flow scale with the global ego-motion scale

motion:
  # Global (camera) ego-motion — cross-checks scale and seeds the search prediction.
  enabled: true
  flow_scale: 0.5
  max_features: 600
  quality_level: 0.01
  min_distance: 8
  min_features: 12
  ransac_thresh: 3.0
  min_inliers: 10
  min_inlier_ratio: 0.5
  mask_dilate_frac: 0.35

verifier:
  # Independent appearance confidence: structure + colour + distinctive geometry.
  w_ncc: 0.4
  w_hist: 0.3
  w_orb: 0.3
  w_tracker: 0.5                # blend of tracker native score vs appearance
  orb_every: 5
  orb_nfeatures: 500
  ema_alpha: 0.3               # recent-template gray EMA rate
  ema_update_conf: 0.6         # refresh the recent template above this fused conf
  tmpl_update_score: 0.7       # OR above this raw tracker score (breaks the deadlock)

loss:
  t_lost: 0.35                 # fused confidence below this = a bad frame
  lost_patience: 8            # consecutive bad frames before LOST (hysteresis)
  min_frame_overlap: 0.3
  max_scale_ratio: 4.0        # per-frame box explosion/collapse sanity (generous for zoom)

reacquire:
  t_reacq: 0.55               # stricter accept than t_lost
  reacq_every: 1
  reacq_downscale: 0.5
  reacq_scales: [0.5, 0.75, 1.0, 1.5, 2.0]
  reacquire_probation_frames: 20
  max_failed_reacquires: 3
  reacquire_cooldown_frames: 90
